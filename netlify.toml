[build]
  command = "npm install"
  functions = "netlify/functions"
  publish = "."
  environment = { NODE_VERSION = "20" }

[functions]
  node_bundler = "nft"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api"
  status = 200
